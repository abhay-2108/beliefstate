name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .

    - name: Install dev dependencies
      run: |
        python -m pip install -e ".[dev]"

    - name: Install optional dependencies (non-blocking)
      run: |
        python -m pip install -e ".[openai,anthropic,ollama,litellm,redis,langchain,llamaindex]" || true

    - name: Skip Gemini on Python 3.12 (compatibility issue)
      if: matrix.python-version != '3.12'
      run: |
        python -m pip install -e ".[gemini]" || true

    - name: Run Ruff Linter
      run: |
        ruff check . --fix-only --exit-zero || true
        ruff check .

    - name: Run Ruff Formatter Check
      run: |
        ruff format --check . || true

    - name: Run Mypy Type Checker (non-blocking)
      run: |
        mypy beliefstate || true

    - name: Run Pytest
      run: |
        pytest -v --tb=short

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      run: |
        python -m pip install coverage pytest-cov
        pytest --cov=beliefstate --cov-report=xml || true
