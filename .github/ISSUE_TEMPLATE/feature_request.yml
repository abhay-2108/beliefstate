name: Feature Request
description: Suggest a new feature or improvement for BeliefState
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this feature would solve
      description: A clear description of the problem. Ex. "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, code examples, or screenshots about the feature request here.
